<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050508;
  --surface: #0e0e14;
  --accent: #a855f7;
  --accent-dim: rgba(168,85,247,0.12);
  --text: #f0f0ee;
  --muted: #6b6b72;
  --border: rgba(255,255,255,0.07);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  overflow-x: hidden;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
  padding: 2rem 1.5rem;
}

body::before {
  content: '';
  position: fixed;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 700px;
  height: 700px;
  background: radial-gradient(ellipse, rgba(168,85,247,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.grain {
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.4;
  pointer-events: none;
  z-index: 0;
}

.wrapper {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  width: 100%;
  max-width: 860px;
}

.headline {
  text-align: center;
  margin-bottom: 4rem;
}
.headline h1 {
  font-size: clamp(2.6rem, 7vw, 5.5rem);
  font-weight: 700;
  letter-spacing: -.03em;
  line-height: 1.08;
}
.headline h1 em {
  font-style: normal;
  color: var(--accent);
}
.headline p {
  margin-top: 1.25rem;
  font-size: clamp(.95rem, 2vw, 1.15rem);
  color: var(--muted);
  font-weight: 300;
  line-height: 1.7;
  max-width: 480px;
  margin-inline: auto;
}

.countdown {
  display: flex;
  align-items: flex-start;
  gap: clamp(.75rem, 3vw, 2rem);
  margin-bottom: 3rem;
}

.unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .65rem;
}

.card {
  width: clamp(72px, 16vw, 120px);
  height: clamp(80px, 18vw, 132px);
  position: relative;
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
}

.card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 1;
}

.tile {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Space Mono', monospace;
  font-size: clamp(2rem, 5.5vw, 4rem);
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.02em;
}

.sep {
  font-family: 'Space Mono', monospace;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 700;
  color: var(--border);
  margin-top: clamp(20px, 4vw, 40px);
  user-select: none;
}

.unit-label {
  font-size: 10px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
}

.divider {
  width: 100%;
  height: 1px;
  background: var(--border);
  margin-bottom: 3rem;
}

.form-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  width: 100%;
  margin-bottom: 3rem;
}
.form-area p {
  font-size: .9rem;
  color: var(--muted);
}
.form-row {
  display: flex;
  gap: .5rem;
  width: 100%;
  max-width: 420px;
}
.form-row input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-size: .95rem;
  padding: 12px 16px;
  outline: none;
  transition: border-color .2s;
}
.form-row input::placeholder { color: var(--muted); }
.form-row input:focus { border-color: rgba(168,85,247,0.5); }
.form-row button {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: .9rem;
  font-weight: 700;
  padding: 12px 22px;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity .2s, transform .1s;
}
.form-row button:hover { opacity: .85; }
.form-row button:active { transform: scale(.97); }

.success-msg {
  display: none;
  align-items: center;
  gap: .5rem;
  font-size: .9rem;
  color: var(--accent);
}

.footer {
  font-size: .78rem;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
}

@media (max-width: 480px) {
  .sep { display: none; }
  .countdown { gap: .5rem; }
}

@media (prefers-reduced-motion: reduce) {
  .tile { transition: none !important; }
}
</style>
</head>
<body>
<div class="grain"></div>
<div class="wrapper">

  <div class="headline">
    <h1>Coming <em>Soon.</em></h1>
    <p>We're working on something worth waiting for. Be the first to know when we're ready.</p>
  </div>

  <div class="countdown">
    <div class="unit">
      <div class="card" id="card-d"></div>
      <span class="unit-label">days</span>
    </div>
    <span class="sep">:</span>
    <div class="unit">
      <div class="card" id="card-h"></div>
      <span class="unit-label">hours</span>
    </div>
    <span class="sep">:</span>
    <div class="unit">
      <div class="card" id="card-m"></div>
      <span class="unit-label">minutes</span>
    </div>
    <span class="sep">:</span>
    <div class="unit">
      <div class="card" id="card-s"></div>
      <span class="unit-label">seconds</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="form-area">
    <p>Notify me on launch</p>
    <div class="form-row" id="form-row">
      <input type="email" id="email-input" placeholder="my@address.com">
      <button onclick="subscribe()">Notify me</button>
    </div>
    <div class="success-msg" id="success-msg">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7.5" stroke="#a855f7" stroke-width="1"/><path d="M5 8l2 2 4-4" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      You're on the list. We will notify you!
    </div>
  </div>

  <span class="footer">&#169; 2026 Veyro Tech &#8212; all rights reserved</span>

</div>
<script>
  const START = new Date('2026-06-10T00:00:00');
  const pad = n => String(n).padStart(2, '0');
  const IDS = ['d','h','m','s'];

  // State per unit: current displayed tile el and the "incoming" tile el
  const state = {};

  IDS.forEach(id => {
    const card = document.getElementById('card-' + id);
    // Create two tiles
    const a = document.createElement('div');
    const b = document.createElement('div');
    a.className = 'tile';
    b.className = 'tile';
    // b starts offscreen below
    b.style.transform = 'translateY(100%)';
    card.appendChild(a);
    card.appendChild(b);
    state[id] = { visible: a, hidden: b, current: null };
  });

  function getTime() {
    const diff = Math.max(0, Date.now() - START);
    return {
      d: Math.floor(diff / 86400000),
      h: Math.floor((diff % 86400000) / 3600000),
      m: Math.floor((diff % 3600000) / 60000),
      s: Math.floor((diff % 60000) / 1000)
    };
  }

  function flip(id, val) {
    const s = state[id];
    if (s.current === val) return;
    s.current = val;

    const incoming = s.hidden;
    const outgoing = s.visible;

    // Set new value on the incoming tile (still offscreen below)
    incoming.textContent = val;
    incoming.style.transition = 'none';
    incoming.style.transform = 'translateY(100%)';

    // Force reflow so transition fires
    incoming.getBoundingClientRect();

    const t = 'transform 0.45s cubic-bezier(0.22,1,0.36,1)';
    // Slide outgoing up and out
    outgoing.style.transition = t;
    outgoing.style.transform = 'translateY(-100%)';
    // Slide incoming up into view
    incoming.style.transition = t;
    incoming.style.transform = 'translateY(0)';

    // After animation swap roles
    setTimeout(() => {
      outgoing.style.transition = 'none';
      outgoing.style.transform = 'translateY(100%)';
      s.visible = incoming;
      s.hidden = outgoing;
    }, 460);
  }

  function tick() {
    const t = getTime();
    flip('d', pad(t.d));
    flip('h', pad(t.h));
    flip('m', pad(t.m));
    flip('s', pad(t.s));
  }

  tick();
  setInterval(tick, 1000);

  function subscribe() {
    const inp = document.getElementById('email-input');
    if (!inp.value || !inp.value.includes('@')) {
      inp.style.borderColor = 'rgba(220,60,60,0.6)';
      setTimeout(() => inp.style.borderColor = '', 1200);
      return;
    }
    document.getElementById('form-row').style.display = 'none';
    document.getElementById('success-msg').style.display = 'flex';
  }
</script>
</body>
</html>
